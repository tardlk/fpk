name: Static Check (L1)

permissions:
  contents: read
  pull-requests: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'scripts/**'
      - '.github/workflows/test-static.yml'
      - '!**/*.md'
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'shared/**'
      - 'scripts/**'
      - '.github/workflows/test-static.yml'
      - '!**/*.md'
  schedule:
    - cron: '30 7 * * *'
  workflow_dispatch:
    inputs:
      app:
        description: 'App slug to check (leave empty for ALL apps)'
        required: false
        type: string
        default: ''

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.detect.outputs.apps }}
      mode: ${{ steps.detect.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect apps
        id: detect
        run: |
          set -e
          EVENT="${{ github.event_name }}"
          INPUT_APP="${{ inputs.app }}"

          all_apps() {
            ls -d apps/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(. != ""))'
          }

          if [ "$EVENT" = "workflow_dispatch" ] && [ -n "$INPUT_APP" ]; then
            APPS="[\"$INPUT_APP\"]"
            MODE="explicit"
          elif [ "$EVENT" = "schedule" ] || [ "$EVENT" = "workflow_dispatch" ]; then
            APPS=$(all_apps)
            MODE="full"
          elif [ "$EVENT" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ] || [ -z "$BEFORE" ]; then
              APPS=$(all_apps)
              MODE="full (first push or unknown base)"
            else
              CHANGED=$(git diff --name-only "$BEFORE" "${{ github.sha }}" 2>/dev/null || true)
              if echo "$CHANGED" | grep -qE '^(shared/|scripts/(test|lib|ci|new-app)|\.github/workflows/test-static)'; then
                APPS=$(all_apps)
                MODE="full (shared change)"
              else
                CHANGED_APPS=$(echo "$CHANGED" | grep -E '^(apps|scripts/apps)/' | cut -d/ -f2 | sort -u | grep -v '^$' || true)
                if [ -z "$CHANGED_APPS" ]; then
                  APPS="[]"
                  MODE="empty"
                else
                  APPS=$(echo "$CHANGED_APPS" | jq -R -s -c 'split("\n") | map(select(. != ""))')
                  MODE="changed ($(echo $CHANGED | wc -l | tr -d ' ') files since $BEFORE)"
                fi
              fi
            fi
          else
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || true)
            if echo "$CHANGED" | grep -qE '^(shared/|scripts/(test|lib|ci|new-app)|\.github/workflows/test-static)'; then
              APPS=$(all_apps)
              MODE="full (shared change in PR)"
            else
              CHANGED_APPS=$(echo "$CHANGED" | grep -E '^(apps|scripts/apps)/' | cut -d/ -f2 | sort -u | grep -v '^$' || true)
              if [ -z "$CHANGED_APPS" ]; then
                APPS="[]"
                MODE="empty"
              else
                APPS=$(echo "$CHANGED_APPS" | jq -R -s -c 'split("\n") | map(select(. != ""))')
                MODE="changed (PR)"
              fi
            fi
          fi

          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "Apps to check ($MODE): $APPS"

  static-check:
    needs: detect
    if: needs.detect.outputs.apps != '[]'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq + shellcheck
        run: sudo apt-get update -y && sudo apt-get install -y jq shellcheck

      - name: Run static checks
        id: run
        env:
          APPS_JSON: ${{ needs.detect.outputs.apps }}
          MODE: ${{ needs.detect.outputs.mode }}
        run: |
          set +e
          mapfile -t apps < <(echo "$APPS_JSON" | jq -r '.[]')
          echo "Mode: $MODE — checking ${#apps[@]} app(s)"
          bash scripts/test/static-check.sh "${apps[@]}"
          RC=$?
          echo "rc=$RC" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Summary
        if: always()
        env:
          RC: ${{ steps.run.outputs.rc }}
          MODE: ${{ needs.detect.outputs.mode }}
          APPS_JSON: ${{ needs.detect.outputs.apps }}
        run: |
          if [ "${RC:-1}" = "0" ]; then
            echo "## ✓ L1 Static Check PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## ✗ L1 Static Check FAIL (non-blocking)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Run \`scripts/test/static-check.sh\` locally and fix the reported issues." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Mode:** $MODE" >> "$GITHUB_STEP_SUMMARY"
          echo "**Apps:** $APPS_JSON" >> "$GITHUB_STEP_SUMMARY"
