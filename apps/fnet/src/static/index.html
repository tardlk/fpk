<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FNet</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#1a1a2e;padding:20px}
.card{background:#fff;border-radius:14px;padding:24px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:14px}

/* BBR toggle */
.toggle-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.toggle{position:relative;width:52px;height:28px;flex-shrink:0}
.toggle input{display:none}
.toggle .slider{position:absolute;inset:0;background:#ccc;border-radius:28px;cursor:pointer;transition:.25s}
.toggle .slider::after{content:'';position:absolute;width:22px;height:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s}
.toggle input:checked+.slider{background:#2e7d32}
.toggle input:checked+.slider::after{transform:translateX(24px)}
.toggle-label{font-size:14px;font-weight:600}

/* metrics */
.metrics{display:flex;gap:10px;margin:14px 0}
.metric{flex:1;background:#f8f9fb;border-radius:8px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.metric-label{font-size:12px;color:#999}
.metric-value{font-size:14px;font-weight:700;font-family:monospace}
.metric-value.on{color:#2e7d32}
.metric-value.off{color:#999}

.info{font-size:13px;color:#666;line-height:1.6}
.info code{background:#eee;padding:1px 6px;border-radius:4px;font-size:12px}

#hostsContent{width:100%;min-height:320px;font-family:"JetBrains Mono","Courier New",monospace;font-size:13px;padding:14px;border:1.5px solid #e0e0e0;border-radius:10px;resize:vertical;line-height:1.6;background:#fafbfc;transition:border-color .2s}
#hostsContent:focus{outline:none;border-color:#1976d2;background:#fff}
.hosts-footer{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.line-count{font-size:12px;color:#999}

.msg{margin-top:10px;padding:10px 14px;border-radius:8px;font-size:13px;display:none}
.msg-success{background:#e8f5e9;color:#2e7d32;display:block}
.msg-error{background:#fbe9e7;color:#c62828;display:block}

.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.status-dot.on{background:#4caf50;animation:pulse 2s infinite}
.status-dot.off{background:#bbb}
.spin{animation:spin .8s linear infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="card">
  <h2>TCP BBR 拥塞控制</h2>
  <p class="info" style="margin-bottom:10px">Google 开发的拥塞控制算法，提升吞吐量、降低延迟。开启后自动应用 Fair Queue，重启持久生效。</p>

  <div class="toggle-row">
    <label class="toggle">
      <input type="checkbox" id="bbrToggle" onchange="toggleBBR(this.checked)">
      <span class="slider"></span>
    </label>
    <span class="toggle-label"><span class="status-dot" id="statusDot"></span><span id="bbrLabel">检测中...</span></span>
  </div>

  <div class="metrics">
    <div class="metric"><span class="metric-label">拥塞算法</span><span class="metric-value" id="congAlg">-</span></div>
    <div class="metric"><span class="metric-label">队列规则</span><span class="metric-value" id="qdisc">-</span></div>
  </div>

  <div id="bbrMsg" class="msg"></div>
</div>

<div class="card">
  <h2>Hosts 编辑</h2>
  <p class="info" style="margin-bottom:12px">编辑 /etc/hosts 文件，每行一条 <code>IP 主机名</code></p>
  <textarea id="hostsContent" placeholder="加载中..." oninput="updateLineCount()"></textarea>
  <div class="hosts-footer">
    <span class="line-count" id="lineCount">0 行</span>
    <button class="btn" style="background:#1976d2;color:#fff;padding:10px 20px;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600" onclick="saveHosts()">保存 hosts</button>
  </div>
  <div id="hostsMsg" class="msg"></div>
</div>

<div style="text-align:center;padding:8px 0 20px;font-size:12px;color:#b0b0b0">
  FNet v1.0.0 · <a href="https://github.com/tardlk/fpk" target="_blank" style="color:#999;text-decoration:none">github.com/tardlk/fpk</a>
</div>

<script>
let bbrEnabled=false

async function loadBBR(){
  try{
    const r=await fetch('/app/fnet/api/bbr'),j=await r.json()
    if(j.success){
      const d=j.data;bbrEnabled=d.enabled
      document.getElementById('bbrToggle').checked=d.enabled
      document.getElementById('bbrLabel').textContent=d.enabled?'BBR 已开启':'BBR 已关闭'
      const dot=document.getElementById('statusDot')
      dot.className='status-dot '+(d.enabled?'on':'off')
      const cong=document.getElementById('congAlg')
      cong.textContent=d.congAlg;cong.className='metric-value '+(d.enabled?'on':'off')
      const qdisc=document.getElementById('qdisc')
      qdisc.textContent=d.qdisc;qdisc.className='metric-value '+(d.enabled?'on':'off')
    }
  }catch(e){document.getElementById('bbrLabel').textContent='加载失败'}
}

async function toggleBBR(enable){
  const tgl=document.getElementById('bbrToggle');tgl.disabled=true
  try{
    const r=await fetch('/app/fnet/api/bbr',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({enable})})
    const j=await r.json()
    if(j.success){
      if(enable){await fetch('/app/fnet/api/qdisc/apply',{method:'POST'})}
      else{await fetch('/app/fnet/api/qdisc/reset',{method:'POST'})}
      loadBBR();showMsg('bbrMsg','msg-success',j.message)
    }else{
      showMsg('bbrMsg','msg-error',j.message);tgl.checked=bbrEnabled
    }
  }catch(e){showMsg('bbrMsg','msg-error','请求失败: '+e.message);tgl.checked=bbrEnabled}
  tgl.disabled=false
}

async function loadHosts(){
  try{
    const r=await fetch('/app/fnet/api/hosts'),j=await r.json()
    if(j.success){document.getElementById('hostsContent').value=j.data.content;updateLineCount()}
  }catch(e){document.getElementById('hostsContent').value='加载失败'}
}

function updateLineCount(){
  document.getElementById('lineCount').textContent=document.getElementById('hostsContent').value.split('\n').length+' 行'
}

async function saveHosts(){
  const content=document.getElementById('hostsContent').value
  try{
    const r=await fetch('/app/fnet/api/hosts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content})})
    const j=await r.json()
    showMsg('hostsMsg',j.success?'msg-success':'msg-error',j.message)
  }catch(e){showMsg('hostsMsg','msg-error','保存失败: '+e.message)}
}

function showMsg(id,cls,text){
  const el=document.getElementById(id)
  el.className='msg '+cls;el.textContent=text
  setTimeout(()=>el.className='msg',4000)
}

loadBBR();loadHosts();
</script>
</body>
</html>
